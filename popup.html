<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>TextClip</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="brand">
    <span class="logo">📰</span>
    <h1>TextClip</h1>
  </div>

  <div class="stat">
    <div class="stat-num" id="countNum">—</div>
    <div class="stat-label">저장된 클립</div>
  </div>

  <button id="openViewer" class="primary">보관함 열기</button>

  <div class="info-box">
    <div class="info-row">
      <span class="info-icon">⚡</span>
      <span>빠른 텍스트 분석 (다운로드 없음)</span>
    </div>
  </div>

  <div class="hint">
    <strong>사용법</strong><br />
    어떤 페이지든 텍스트 드래그 → 우클릭 →<br />
    <em>"TextClip에 저장"</em>
  </div>

  <script src="popup.js"></script>
</body>
</html>
