<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>TextClip</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="brand">
    <span class="logo">📰</span>
    <h1>TextClip</h1>
  </div>

  <div class="stat">
    <div class="stat-num" id="countNum">—</div>
    <div class="stat-label">저장된 클립</div>
  </div>

  <button id="openViewer" class="primary">보관함 열기</button>

  <div class="help-box">
    <h2 class="help-title">TextClip 사용법</h2>

    <div class="help-item">
      <div class="help-item-title">📌 텍스트 드래그 → 우클릭 → 저장</div>
      <div class="help-item-desc">어떤 페이지에서든 가능합니다.</div>
    </div>

    <div class="help-item">
      <div class="help-item-title">💾 본인 PC에 저장 (외부 전송 없음)</div>
      <div class="help-item-desc">같은 Chrome 프로필에서만 보입니다.<br />
        다른 PC로 옮기려면 보관함의 📤 내보내기 사용.</div>
      <div class="help-item-desc">⚠️ 이 Chrome 프로필에만 저장됩니다. 다른 PC에서 보려면 정기 백업이 필요합니다.</div>
    </div>

    <div class="help-item">
      <div class="help-item-title">🤖 AI 요약 — 본인이 쓰는 AI 활용</div>
      <div class="help-item-desc">GPT, Gemini, Claude 등 어디든 OK.<br />
        API 키 불필요, 클립보드로 복사·붙여넣기 방식.</div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
