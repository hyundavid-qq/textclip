<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI 요약 프롬프트 설정</title>
  <link rel="stylesheet" href="viewer.css" />
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <header class="settings-header">
    <a href="viewer.html">← 보관함으로</a>
    <h1>AI 요약 프롬프트 설정</h1>
  </header>

  <main class="settings-main">
    <section>
      <div class="section-header">
        <h2>AI 요약 프롬프트</h2>
        <button class="add-prompt-btn" id="btnAddPrompt">+ 새 프롬프트</button>
      </div>
      <p class="section-desc">활성 프롬프트가 본문 앞에 자동으로 붙습니다. ⭐로 즐겨찾기하면 위쪽에 표시됩니다.</p>

      <div id="promptForm" class="prompt-form" hidden>
        <h3 id="promptFormTitle">새 프롬프트</h3>
        <div class="form-field">
          <label for="promptNameInput">이름 <span class="form-required">*</span></label>
          <input type="text" id="promptNameInput" maxlength="30" placeholder="예: 키워드 중심 요약" />
          <div class="form-hint">1-30자</div>
        </div>
        <div class="form-field">
          <label for="promptContentInput">내용 <span class="form-required">*</span></label>
          <textarea id="promptContentInput" rows="10" placeholder="AI에 보낼 지시문을 입력하세요. 본문이 이 텍스트 뒤에 붙습니다."></textarea>
          <div class="form-hint">10자 이상</div>
        </div>
        <div class="form-actions">
          <button id="btnPromptCancel" class="btn-secondary">취소</button>
          <button id="btnPromptSave" class="btn-primary">저장</button>
        </div>
      </div>

      <div id="promptList" class="prompt-list"></div>
    </section>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <template id="promptItemTemplate">
    <div class="prompt-item">
      <div class="prompt-item-header">
        <input type="radio" name="activePrompt" class="prompt-radio" />
        <button class="favorite-btn" type="button" title="즐겨찾기">☆</button>
        <span class="prompt-name"></span>
        <div class="prompt-actions">
          <button class="prompt-edit" type="button">편집</button>
          <button class="prompt-delete" type="button">삭제</button>
        </div>
      </div>
      <div class="prompt-content-preview"></div>
    </div>
  </template>

  <script src="ai-prompts.js"></script>
  <script src="settings.js"></script>
</body>
</html>
