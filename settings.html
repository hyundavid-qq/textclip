<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TextClip 설정</title>
  <link rel="stylesheet" href="viewer.css" />
  <link rel="stylesheet" href="settings.css" />
</head>
<body>
  <header class="topbar settings-topbar">
    <div class="topbar-left">
      <a href="viewer.html" class="back-link">← 보관함으로</a>
    </div>
    <div class="topbar-center">
      <h1>TextClip 설정</h1>
    </div>
    <div class="topbar-actions"></div>
  </header>

  <main class="settings-main">
    <section class="settings-section">
      <h2 class="section-title">AI 요약 프롬프트</h2>
      <p class="section-hint">AI 요약 시 본문 앞에 붙어 클립보드로 복사되는 텍스트입니다.<br />
        선택된 활성 프롬프트가 사용됩니다.</p>

      <ul id="promptList" class="prompt-list"></ul>

      <button id="btnAddPrompt" class="btn-add-prompt">+ 새 프롬프트 추가</button>

      <div id="promptForm" class="prompt-form" hidden>
        <h3 id="promptFormTitle">새 프롬프트</h3>
        <div class="form-field">
          <label for="promptNameInput">이름 <span class="form-required">*</span></label>
          <input type="text" id="promptNameInput" maxlength="30" placeholder="예: 키워드 중심 요약" />
          <div class="form-hint">1-30자</div>
        </div>
        <div class="form-field">
          <label for="promptContentInput">내용 <span class="form-required">*</span></label>
          <textarea id="promptContentInput" rows="10" placeholder="AI에 보낼 지시문을 입력하세요. 본문이 이 텍스트 뒤에 붙습니다."></textarea>
          <div class="form-hint">10자 이상</div>
        </div>
        <div class="form-actions">
          <button id="btnPromptCancel" class="btn-secondary">취소</button>
          <button id="btnPromptSave" class="btn-primary">저장</button>
        </div>
      </div>
    </section>
  </main>

  <div id="toastContainer" class="toast-container"></div>

  <template id="promptCardTemplate">
    <li class="prompt-card">
      <div class="prompt-card-header">
        <label class="prompt-radio">
          <input type="radio" name="activePrompt" />
          <span class="prompt-name"></span>
        </label>
        <span class="active-badge">활성</span>
      </div>
      <p class="prompt-preview"></p>
      <div class="prompt-actions">
        <button class="btn-edit-prompt">편집</button>
        <button class="btn-delete-prompt">삭제</button>
      </div>
    </li>
  </template>

  <script src="ai-prompts.js"></script>
  <script src="settings.js"></script>
</body>
</html>
